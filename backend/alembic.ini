# Alembic configuration — plan 3.6 (versioned, reversible migrations)
[alembic]
script_location = alembic
# prepend_sys_path is only needed when running alembic directly from the host
# with the source tree. Inside Docker the package is installed as a wheel and
# is already on sys.path — leaving this blank avoids a no-op path addition.
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Overridden at runtime from Settings / test fixtures.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
