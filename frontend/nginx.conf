# Nginx configuration for the Marketplace Conciliator web container (plan 3.8.1)
#
# Responsibilities:
#   1. Serve the React SPA static bundle from /usr/share/nginx/html
#   2. Reverse-proxy /api requests to the FastAPI backend (internal network)
#   3. SPA fallback: all unknown paths → /index.html (React Router support)
#   4. Basic security headers (subset; HSTS/CSP added in T-6.1 with TLS)
#   5. gzip compression for text assets
#
# The `api` hostname resolves via Docker Compose's internal DNS.

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ── security headers ──────────────────────────────────────────────────────
    # Full CSP and HSTS are added in T-6.1 once TLS is terminated here.
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "DENY"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── reverse proxy: /api → FastAPI backend ─────────────────────────────────
    # Path is forwarded as-is: /api/v1/health → http://api:8000/api/v1/health
    location /api {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow conciliation uploads up to 50 MB (RNF-01 / plan 3.9)
        client_max_body_size 50m;

        # Generous timeouts for long-running conciliation polls (ADR-002)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback: all routes served by React Router ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; index.html never cached
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
